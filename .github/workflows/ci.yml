name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5df2 # v4.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@1d99cf73d75073f497935625973d5300ac7a1e12 # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Biome lint
        run: pnpm lint

      - name: Run Markdown lint
        run: pnpm lint:md

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5df2 # v4.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@1d99cf73d75073f497935625973d5300ac7a1e12 # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest
        run: pnpm test run

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5df2 # v4.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@1d99cf73d75073f497935625973d5300ac7a1e12 # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@066042467d018671607f23a51b2c4e207166133f # v1.6.0
        with:
          version: v2.81.2 # Pinned for deterministic runs

      - name: Start Supabase local instance
        run: supabase start --exclude-containers studio,inbucket,realtime,edge-runtime,postgrest

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRydW0tY2hhcnRlciIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzExNTQzMjAwLCJleHAiOjIwMjcxOTkyMDB9.dummy_anon_key
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRydW0tY2hhcnRlciIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE3MTE1NDMyMDAsImV4cCI6MjAyNzE5OTIwMH0.dummy_service_role_key
          CI: true
