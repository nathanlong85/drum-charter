name: Supabase Keep-Alive

on:
  schedule:
    # Run every 6 days at 00:00 UTC to prevent the 7-day inactivity pause
    - cron: '0 0 */6 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # A simple query using the Supabase REST API (PostgREST) to count profiles.
          # This counts as database activity.
          curl -X GET "${SUPABASE_URL}/rest/v1/profiles?select=count" \
          -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
          -H "Content-Type: application/json"
