name: Supabase Keep-Alive

on:
  schedule:
    # Run every 3 days at 00:00 UTC to provide a buffer against the 7-day inactivity pause
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Secrets
        env:
          URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$URL" ]; then
            echo "Error: NEXT_PUBLIC_SUPABASE_URL is not set"
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "Error: SUPABASE_SERVICE_ROLE_KEY is not set"
            exit 1
          fi

      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Pinging Supabase at ${SUPABASE_URL}..."
          
          # 1. Basic Health Check (check if host is resolvable/up)
          if ! curl -Is --connect-timeout 5 "${SUPABASE_URL}" > /dev/null; then
            echo "Warning: Base URL health check failed. Instance might be paused or down."
          fi

          # 2. Database Query via PostgREST API
          # Counting profiles counts as database activity.
          echo "Executing keep-alive query..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET "${SUPABASE_URL}/rest/v1/profiles?select=count" \
          --connect-timeout 5 --max-time 20 --retry 2 --retry-delay 2 \
          -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
          -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Successfully kept Supabase instance alive."
          else
            echo "Response Body: $BODY"
            echo "Failed to query database. Status code: $HTTP_STATUS"
            exit 1
          fi
