name: Deployment Ritual

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy_migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Migrations to Staging
        if: github.ref == 'refs/heads/staging'
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID_STAGING }} --password ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Migrations to Production
        if: github.ref == 'refs/heads/main'
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PROD }} --password ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
