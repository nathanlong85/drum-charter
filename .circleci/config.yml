version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. E2E & PWA TESTS (Supabase + Playwright)
  # -----------------------------------------------------------------------------------
  test-e2e:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Setup Node.js and pnpm
          command: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            nvm alias default 22
            npm install -g pnpm
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
            echo 'nvm use 22 > /dev/null' >> $BASH_ENV
            echo 'export PATH=$(npm config get prefix)/bin:$PATH' >> $BASH_ENV
      - run:
          name: Install dependencies
          command: |
            source $BASH_ENV
            pnpm install
      - run:
          name: Install Playwright Browsers
          command: |
            source $BASH_ENV
            pnpm exec playwright install --with-deps chromium
      - run:
          name: Setup Docker Permissions
          command: sudo chmod 666 /var/run/docker.sock
      - run:
          name: Start Supabase (local)
          command: |
            source $BASH_ENV
            npx supabase start --no-backup
            echo "Waiting for Supabase..."
            HEALTHY=false
            for i in {1..60}; do
              if curl -s http://127.0.0.1:54321/rest/v1/ > /dev/null; then
                echo "Supabase is ready"
                HEALTHY=true
                break
              fi
              echo "Waiting for services... ($i/60)"
              sleep 5
            done
            if [ "$HEALTHY" != "true" ]; then
              echo "Supabase failed to start"
              docker ps -a
              exit 1
            fi
            SUPABASE_STATUS=$(npx supabase status -o json)
            echo "export NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=" + .ANON_KEY' >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export SUPABASE_SERVICE_ROLE_KEY=" + .SERVICE_ROLE_KEY' >> $BASH_ENV
      - run:
          name: Build Next.js app
          no_output_timeout: 30m
          command: |
            source $BASH_ENV
            # Parallel heartbeat that prints every 30 seconds
            (while true; do echo "HEARTBEAT: build $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm build
            kill $HEARTBEAT_PID
      - run:
          name: Run Playwright E2E Tests
          no_output_timeout: 30m
          command: |
            source $BASH_ENV
            # Parallel heartbeat that prints every 30 seconds
            (while true; do echo "HEARTBEAT: tests $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            export SKIP_BUILD=true
            pnpm test:e2e -- --project=chromium --trace on
            kill $HEARTBEAT_PID
          environment:
            CI: "true"
            NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      - store_artifacts:
          path: test-results
          destination: playwright-results

  # -----------------------------------------------------------------------------------
  # 4. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
