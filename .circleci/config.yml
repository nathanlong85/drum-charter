version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. BUILD APP (Pre-build for E2E)
  # -----------------------------------------------------------------------------------
  build-app:
    executor: node-executor
    resource_class: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Build Next.js app
          command: pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm run build
          environment:
            NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
      - persist_to_workspace:
          root: .
          paths:
            - .next
            - public
            - node_modules

  # -----------------------------------------------------------------------------------
  # 4. E2E TESTS (Sharded Machine)
  # -----------------------------------------------------------------------------------
  test-e2e:
    parameters:
      shard:
        type: string
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Setup and Run E2E Shard << parameters.shard >>
          no_output_timeout: 30m
          command: |
            set -e
            echo "--- STEP 1: Node Setup ---"
            export NVM_DIR="/opt/circleci/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
            else
              echo "NVM not found at /opt/circleci/.nvm, checking $HOME/.nvm"
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            fi
            
            if command -v nvm; then
              nvm install 22
              nvm use 22
            else
              echo "NVM not available, using system node"
            fi
            
            node -v
            npm install -g pnpm
            pnpm -v
            
            echo "--- STEP 2: Docker & jq ---"
            sudo chmod 666 /var/run/docker.sock
            sudo apt-get update && sudo apt-get install -y jq
            
            echo "--- STEP 3: Supabase ---"
            # Start heartbeat
            (while true; do echo "CI HEARTBEAT $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            
            npx supabase start --no-backup
            
            echo "Waiting for Supabase..."
            READY=false
            for i in {1..60}; do
              if curl -s http://localhost:54321/rest/v1/ > /dev/null; then
                echo "Supabase ready"
                READY=true
                break
              fi
              echo "Waiting... ($i/60) $(date)"
              sleep 5
            done
            
            if [ "$READY" = "false" ]; then
              echo "Supabase timed out"
              npx supabase status
              exit 1
            fi
            
            SUPABASE_STATUS=$(npx supabase status -o json)
            export NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$(echo "$SUPABASE_STATUS" | jq -r .ANON_KEY)
            export SUPABASE_SERVICE_ROLE_KEY=$(echo "$SUPABASE_STATUS" | jq -r .SERVICE_ROLE_KEY)
            
            echo "--- STEP 4: Playwright ---"
            pnpm exec playwright install --with-deps chromium
            
            echo "--- STEP 5: Run Shard << parameters.shard >> ---"
            export SKIP_BUILD=true
            pnpm test:e2e -- --project=chromium --shard=<< parameters.shard >>/4
            
            kill $HEARTBEAT_PID
      - store_artifacts:
          path: test-results
          destination: playwright-results-shard-<< parameters.shard >>
      - store_artifacts:
          path: playwright-report
          destination: playwright-report-shard-<< parameters.shard >>

  # -----------------------------------------------------------------------------------
  # 5. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - build-app:
          requires:
            - lint
            - test-unit
      - test-e2e:
          name: test-e2e-shard-1
          shard: "1"
          requires:
            - build-app
      - test-e2e:
          name: test-e2e-shard-2
          shard: "2"
          requires:
            - build-app
      - test-e2e:
          name: test-e2e-shard-3
          shard: "3"
          requires:
            - build-app
      - test-e2e:
          name: test-e2e-shard-4
          shard: "4"
          requires:
            - build-app
      - deploy-migrations:
          requires:
            - test-e2e-shard-1
            - test-e2e-shard-2
            - test-e2e-shard-3
            - test-e2e-shard-4
          filters:
            branches:
              only:
                - main
                - staging
