version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  node: circleci/node@7.0.0

# Parameters to use for conditional execution
parameters:
  run-pwa-e2e:
    type: boolean
    default: true

# Reusable executor definitions
executors:
  machine-executor:
    machine:
      image: ubuntu-2404:current
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor:
      name: node/default
      tag: '22.14'
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: sudo npm install -g pnpm && pnpm install
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor:
      name: node/default
      tag: '22.14'
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: sudo npm install -g pnpm && pnpm install
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. E2E & PWA TESTS (Supabase + Playwright)
  # -----------------------------------------------------------------------------------
  test-e2e:
    executor: machine-executor
    steps:
      - checkout
      - node/install:
          node-version: '22.14'
      - run:
          name: Install pnpm
          command: npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Install Playwright Browsers
          command: pnpm exec playwright install --with-deps chromium
      - run:
          name: Install Supabase CLI
          command: |
            # Using the official installation script for CircleCI
            curl -L https://github.com/supabase/cli/releases/download/v2.81.2/supabase_2.81.2_linux_amd64.tar.gz -o supabase.tar.gz
            tar -xzf supabase.tar.gz
            sudo mv supabase /usr/local/bin/
      - run:
          name: Start Supabase (local)
          command: |
            # Simple start, machine executor should have docker ready
            supabase start
            # Extract keys for test environment
            SUPABASE_STATUS=$(supabase status -o json)
            echo "export NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $BASH_ENV
            echo $SUPABASE_STATUS | python3 -c "import sys, json; data=json.load(sys.stdin); print(f'export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY={data[\"ANON_KEY\"]}')" >> $BASH_ENV
            echo $SUPABASE_STATUS | python3 -c "import sys, json; data=json.load(sys.stdin); print(f'export SUPABASE_SERVICE_ROLE_KEY={data[\"SERVICE_ROLE_KEY\"]}')" >> $BASH_ENV
      - run:
          name: Run Playwright E2E Tests
          command: |
            source $BASH_ENV
            pnpm test:e2e
          environment:
            CI: "true"
      - when:
          condition: << pipeline.parameters.run-pwa-e2e >>
          steps:
            - run:
                name: Run PWA Offline Tests
                command: |
                  source $BASH_ENV
                  pnpm test:e2e tests/e2e/offline-support.spec.ts
                environment:
                  RUN_OFFLINE_E2E: "true"
                  CI: "true"
      - store_artifacts:
          path: test-results
          destination: playwright-results

  # -----------------------------------------------------------------------------------
  # 4. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor:
      name: node/default
      tag: '22.14'
    steps:
      - checkout
      - run:
          name: Install Supabase CLI
          command: |
            curl -L https://github.com/supabase/cli/releases/download/v2.81.2/supabase_2.81.2_linux_amd64.tar.gz -o supabase.tar.gz
            tar -xzf supabase.tar.gz
            sudo mv supabase /usr/local/bin/
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
