version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  node: circleci/node@6.0.0
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: pnpm
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: pnpm
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. E2E TESTS (Sharded Docker)
  # -----------------------------------------------------------------------------------
  test-e2e:
    parameters:
      shard:
        type: string
    executor: node-executor
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - node/install-packages:
          pkg-manager: pnpm
      - run:
          name: Setup and Run E2E Shard << parameters.shard >>
          no_output_timeout: 30m
          command: |
            set -e
            echo "--- STEP 1: Supabase ---"
            (while true; do echo "CI HEARTBEAT $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            
            # Install jq for key extraction
            sudo apt-get update && sudo apt-get install -y jq
            
            # Start Supabase (remote docker via CLI)
            pnpm supabase start --no-backup
            
            echo "Waiting for Supabase..."
            for i in {1..60}; do
              if curl -s http://localhost:54321/rest/v1/ > /dev/null; then
                echo "Supabase ready"
                break
              fi
              echo "Waiting... $i"
              sleep 5
            done
            
            SUPABASE_STATUS=$(pnpm supabase status -o json)
            export NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$(echo "$SUPABASE_STATUS" | jq -r .ANON_KEY)
            export SUPABASE_SERVICE_ROLE_KEY=$(echo "$SUPABASE_STATUS" | jq -r .SERVICE_ROLE_KEY)
            
            echo "--- STEP 2: Build App ---"
            # Build AFTER supabase is up so the keys are real
            pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm run build
            
            echo "--- STEP 3: Playwright ---"
            pnpm exec playwright install --with-deps chromium
            
            echo "--- STEP 4: Run Shard << parameters.shard >> ---"
            export SKIP_BUILD=true
            pnpm test:e2e -- --project=chromium --shard=<< parameters.shard >>/4
            
            kill $HEARTBEAT_PID
      - store_artifacts:
          path: test-results
          destination: playwright-results-shard-<< parameters.shard >>
      - store_artifacts:
          path: playwright-report
          destination: playwright-report-shard-<< parameters.shard >>

  # -----------------------------------------------------------------------------------
  # 4. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: pnpm
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase_db_push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          name: test-e2e-shard-1
          shard: "1"
          requires:
            - lint
            - test-unit
      - test-e2e:
          name: test-e2e-shard-2
          shard: "2"
          requires:
            - lint
            - test-unit
      - test-e2e:
          name: test-e2e-shard-3
          shard: "3"
          requires:
            - lint
            - test-unit
      - test-e2e:
          name: test-e2e-shard-4
          shard: "4"
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e-shard-1
            - test-e2e-shard-2
            - test-e2e-shard-3
            - test-e2e-shard-4
          filters:
            branches:
              only:
                - main
                - staging
