version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. BUILD APP (Pre-build for E2E)
  # -----------------------------------------------------------------------------------
  build-app:
    executor: node-executor
    resource_class: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Build Next.js app
          command: pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm build
          environment:
            NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
      - persist_to_workspace:
          root: .
          paths:
            - .next
            - public
            - node_modules

  # -----------------------------------------------------------------------------------
  # 4. E2E & PWA TESTS (Supabase + Playwright)
  # -----------------------------------------------------------------------------------
  test-e2e:
    executor: node-executor
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install Playwright Browsers
          command: pnpm exec playwright install --with-deps chromium
      - run:
          name: Start Supabase (remote docker)
          command: |
            set -e -o pipefail
            # Supabase start
            pnpm supabase start --no-backup
            
            # Wait for healthy using bridge IP
            BRIDGE_IP=$(docker network inspect bridge -f '{{ (index .IPAM.Config 0).Gateway }}')
            echo "Detected Bridge IP: $BRIDGE_IP"
            
            echo "Waiting for services..."
            READY=false
            for i in {1..60}; do
              if curl -s http://localhost:54321/rest/v1/ > /dev/null; then
                echo "Supabase is ready"
                READY=true
                break
              fi
              echo "Waiting... ($i/60)"
              sleep 5
            done
            
            if [ "$READY" = "false" ]; then
              echo "Supabase timed out"
              pnpm supabase status
              exit 1
            fi
            
            SUPABASE_STATUS=$(pnpm supabase status -o json)
            echo "export NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=" + .ANON_KEY' >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export SUPABASE_SERVICE_ROLE_KEY=" + .SERVICE_ROLE_KEY' >> $BASH_ENV
            echo "export SUPABASE_BRIDGE_IP=$BRIDGE_IP" >> $BASH_ENV
      - run:
          name: Run Playwright E2E Tests
          no_output_timeout: 15m
          command: |
            set -e -o pipefail
            source $BASH_ENV
            export SKIP_BUILD=true
            # Map localhost to bridge IP for the app to find Supabase
            pnpm test:e2e -- --project=chromium --trace on
          environment:
            CI: "true"
            # We will use localhost because Supabase CLI maps ports from remote docker to localhost in setup_remote_docker
            NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      - store_artifacts:
          path: test-results
          destination: playwright-results

  # -----------------------------------------------------------------------------------
  # 5. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - build-app:
          requires:
            - lint
            - test-unit
      - test-e2e:
          requires:
            - build-app
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
