version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

  machine-executor:
    machine:
      image: ubuntu-2404:current
    working_directory: ~/repo

jobs:
  lint:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            sudo npm install -g pnpm
            pnpm install
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  test-unit:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            sudo npm install -g pnpm
            pnpm install
      - run:
          name: Run Vitest
          command: pnpm test run

  test-e2e:
    machine:
      image: ubuntu-2404:current
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Setup Node.js
          command: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: Install pnpm
          command: |
            curl -fsSL https://get.pnpm.io/install.sh | sh -
            echo 'export PATH="$HOME/.local/share/pnpm:$PATH"' >> $BASH_ENV
      - run:
          name: Install dependencies
          command: |
            source $BASH_ENV
            pnpm install
      - run:
          name: Install Playwright Browsers
          command: |
            source $BASH_ENV
            pnpm exec playwright install --with-deps chromium
      - run:
          name: Setup Docker Permissions
          command: sudo chmod 666 /var/run/docker.sock
      - run:
          name: Start Supabase (local)
          command: |
            source $BASH_ENV
            # Start Supabase and wait for health
            pnpm supabase start
            # Wait for postgres to be ready (longer wait)
            for i in {1..20}; do
              if docker exec supabase_db_drum-charter pg_isready -U postgres &> /dev/null; then
                echo "Database is ready"
                break
              fi
              echo "Waiting for database... ($i/20)"
              sleep 5
            done
            # Log all containers for diagnosis
            docker ps -a
            for container in $(docker ps -a --format "{{.Names}}"); do
              echo "Logs for $container:"
              docker logs $container --tail 100 || true
            done
            SUPABASE_STATUS=$(pnpm supabase status -o json)
            echo "export NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $BASH_ENV
            echo "export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$(echo $SUPABASE_STATUS | jq -r '.ANON_KEY')" >> $BASH_ENV
            echo "export SUPABASE_SERVICE_ROLE_KEY=$(echo $SUPABASE_STATUS | jq -r '.SERVICE_ROLE_KEY')" >> $BASH_ENV
      - run:
          name: Run Playwright E2E Tests
          command: |
            source $BASH_ENV
            pnpm test:e2e -- --trace on || (docker ps && exit 1)
          environment:
            CI: "true"
      - store_artifacts:
          path: test-results
          destination: playwright-results

  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Supabase CLI
          command: |
            curl -L https://github.com/supabase/cli/releases/download/v2.81.2/supabase_2.81.2_linux_amd64.tar.gz -o supabase.tar.gz
            tar -xzf supabase.tar.gz
            sudo mv supabase /usr/local/bin/
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
