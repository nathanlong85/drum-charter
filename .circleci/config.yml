version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Build types
          command: pnpm build
          environment:
            NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
      - run:
          name: Run Type check
          command: pnpm tsc --noEmit
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. E2E & PWA TESTS (Supabase + Build + Playwright)
  # -----------------------------------------------------------------------------------
  test-e2e:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Setup Node.js and pnpm
          command: |
            echo "Starting Setup..."
            # Try to install jq without full update first
            sudo apt-get install -y jq || (sudo apt-get update && sudo apt-get install -y jq)
            
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
              nvm install 22
              nvm use 22
            else
              echo "NVM not found, using system node"
            fi
            
            node -v
            npm install -g pnpm
            pnpm -v
            
            echo "export PATH=$(npm config get prefix)/bin:\$PATH" >> $BASH_ENV
            echo "Setup complete."
      - run:
          name: Install dependencies
          command: |
            set -e -o pipefail
            source $BASH_ENV
            pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - restore_cache:
          keys:
            - playwright-browsers-v1-{{ checksum "package.json" }}
            - playwright-browsers-v1-
      - run:
          name: Install Playwright Browsers
          command: |
            set -e -o pipefail
            source $BASH_ENV
            pnpm exec playwright install --with-deps chromium
      - save_cache:
          key: playwright-browsers-v1-{{ checksum "package.json" }}
          paths:
            - ~/.cache/ms-playwright
      - run:
          name: Setup Docker Permissions
          command: sudo chmod 666 /var/run/docker.sock
      - run:
          name: Debug Environment
          command: |
            set -e -o pipefail
            source $BASH_ENV
            node -v
            pnpm -v
            docker --version
            docker ps
      - run:
          name: Start Supabase (local)
          command: |
            set -e -o pipefail
            source $BASH_ENV
            # Increase output to prevent 10m timeout
            (while true; do echo "Supabase starting... $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            npx supabase start --no-backup
            kill $HEARTBEAT_PID
            
            # Wait for healthy
            echo "Waiting for services..."
            READY=false
            for i in {1..60}; do
              if curl -s http://127.0.0.1:54321/rest/v1/ > /dev/null; then
                echo "Supabase is ready"
                READY=true
                break
              fi
              echo "Waiting... ($i/60)"
              sleep 5
            done
            
            if [ "$READY" = "false" ]; then
              echo "Supabase timed out"
              npx supabase status
              exit 1
            fi
            
            # Extract and export keys
            SUPABASE_STATUS=$(npx supabase status -o json)
            echo "$SUPABASE_STATUS"
            
            echo "export NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=" + .ANON_KEY' >> $BASH_ENV
            echo "$SUPABASE_STATUS" | jq -r '"export SUPABASE_SERVICE_ROLE_KEY=" + .SERVICE_ROLE_KEY' >> $BASH_ENV
            echo "Keys exported."
      - run:
          name: Build Next.js app (with real keys)
          no_output_timeout: 15m
          command: |
            set -e -o pipefail
            source $BASH_ENV
            (while true; do echo "Building app... $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            export NODE_OPTIONS="--max-old-space-size=4096"
            pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm build
            kill $HEARTBEAT_PID
      - run:
          name: Run Playwright E2E Tests
          no_output_timeout: 15m
          command: |
            set -e -o pipefail
            source $BASH_ENV
            (while true; do echo "Tests running... $(date)"; sleep 30; done) &
            HEARTBEAT_PID=$!
            export SKIP_BUILD=true
            pnpm test:e2e -- --project=chromium --trace on
            kill $HEARTBEAT_PID
          environment:
            CI: "true"
      - store_artifacts:
          path: test-results
          destination: playwright-results

  # -----------------------------------------------------------------------------------
  # 5. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
