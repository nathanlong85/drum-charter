version: 2.1

# -------------------------------------------------------------------------------------
# DrumCharter CI/CD Configuration (CircleCI)
# -------------------------------------------------------------------------------------

orbs:
  browser-tools: circleci/browser-tools@1.5.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/repo

jobs:
  # -----------------------------------------------------------------------------------
  # 1. LINTING
  # -----------------------------------------------------------------------------------
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Biome lint
          command: pnpm lint
      - run:
          name: Run Markdown lint
          command: pnpm lint:md

  # -----------------------------------------------------------------------------------
  # 2. UNIT TESTS
  # -----------------------------------------------------------------------------------
  test-unit:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
      - run:
          name: Run Vitest
          command: pnpm test run

  # -----------------------------------------------------------------------------------
  # 3. E2E TESTS (All-in-one Machine)
  # -----------------------------------------------------------------------------------
  test-e2e:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Setup and Run E2E
          no_output_timeout: 20m
          command: |
            set -e -o pipefail
            
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
            
            echo "Setting up Node.js..."
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            npm install -g pnpm
            
            echo "Installing dependencies..."
            pnpm install
            
            echo "Starting Supabase..."
            pnpm supabase start --no-backup
            
            echo "Waiting for Supabase..."
            for i in {1..60}; do
              if curl -s http://localhost:54321/rest/v1/ > /dev/null; then
                echo "Supabase is ready"
                break
              fi
              echo "Waiting... ($i/60)"
              sleep 5
            done
            
            SUPABASE_STATUS=$(pnpm supabase status -o json)
            export NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$(echo "$SUPABASE_STATUS" | jq -r .ANON_KEY)
            export SUPABASE_SERVICE_ROLE_KEY=$(echo "$SUPABASE_STATUS" | jq -r .SERVICE_ROLE_KEY)
            
            echo "Building app..."
            pnpm cross-env NEXT_PUBLIC_FORCE_SW=true pnpm run build
            
            echo "Installing Playwright browsers..."
            pnpm exec playwright install --with-deps chromium
            
            echo "Running tests..."
            pnpm test:e2e -- --project=chromium --trace on
      - store_artifacts:
          path: test-results
          destination: playwright-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report

  # -----------------------------------------------------------------------------------
  # 5. DATABASE SYNC (Supabase Migrations)
  # -----------------------------------------------------------------------------------
  deploy-migrations:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Push Migrations to Staging
          command: |
            if [ "$CIRCLE_BRANCH" = "staging" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_STAGING --password $SUPABASE_DB_PASSWORD_STAGING
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_STAGING
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN
      - run:
          name: Push Migrations to Production
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              pnpm supabase link --project-ref $SUPABASE_PROJECT_ID_PROD --password $SUPABASE_DB_PASSWORD_PROD
              pnpm supabase db push --password $SUPABASE_DB_PASSWORD_PROD
            fi
          environment:
            SUPABASE_ACCESS_TOKEN: $SUPABASE_ACCESS_TOKEN

# -------------------------------------------------------------------------------------
# WORKFLOW DEFINITIONS
# -------------------------------------------------------------------------------------
workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test-unit
      - test-e2e:
          requires:
            - lint
            - test-unit
      - deploy-migrations:
          requires:
            - test-e2e
          filters:
            branches:
              only:
                - main
                - staging
