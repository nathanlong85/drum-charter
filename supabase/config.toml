# Supabase Configuration for DrumCharter
project_id = "drum-charter"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3001"
additional_redirect_urls = ["http://127.0.0.1:3001"]
enable_signup = true
enable_anonymous_sign_ins = true

[edge_runtime]
enabled = false

[analytics]
enabled = false
